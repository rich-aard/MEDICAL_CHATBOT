<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 AI Medical Chatbot</title>
    <style>
        :root {
            --primary-color: #0284c7;
            --primary-hover: #0369a1;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --user-msg: #e0f2fe;
            --bot-msg: #f1f5f9;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            margin: 0; 
            padding: 2rem 1rem;
            background-color: var(--bg-color);
            color: var(--text-dark);
        }
        
        .chat-container { 
            max-width: 750px; 
            margin: 0 auto; 
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        h1 {
            margin-top: 0;
            font-size: 1.75rem;
            color: var(--primary-color);
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .error-box { 
            background-color: var(--error-bg);
            color: var(--error-text);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            border-left: 4px solid var(--error-text);
        }

        #chat-box {
            max-height: 450px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            padding-right: 0.5rem;
        }

        .message { 
            margin-bottom: 1rem; 
            padding: 0.85rem 1.1rem; 
            border-radius: 8px; 
            line-height: 1.5;
            /* Fixes line breaks natively without needing a custom jinja2 nl2br filter */
            white-space: pre-wrap; 
        }

        .user { 
            background-color: var(--user-msg); 
            margin-left: 20%;
            border-bottom-right-radius: 2px;
        }

        .assistant { 
            background-color: var(--bot-msg); 
            margin-right: 20%;
            border-bottom-left-radius: 2px;
        }

        .msg-role {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            color: #64748b;
            display: block;
        }

        form { margin-top: 1.5rem; }
        
        textarea { 
            width: 100%; 
            height: 4rem; 
            padding: 0.75rem; 
            font-size: 1rem; 
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15);
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.75rem;
        }

        button { 
            padding: 0.65rem 1.25rem; 
            font-size: 0.95rem; 
            font-weight: 500;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .send-btn {
            background-color: var(--primary-color);
            color: white;
        }

        .send-btn:hover {
            background-color: var(--primary-hover);
        }

        .clear-btn { 
            background-color: #ef4444;
            color: white;
        }

        .clear-btn:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>🔍 AI Medical Chatbot</h1>

        {% if error %}
            <div class="error-box">
                <strong>Error:</strong> {{ error }}
            </div>
        {% endif %}

        <div id="chat-box">
            {% for msg in messages %}
                <div class="message {{ msg.role }}">
                    <span class="msg-role">{{ 'Patient' if msg.role == 'user' else 'AI Doctor' }}:</span>
                    {{ msg.content | safe }}
                </div>
            {% endfor %}
        </div>

        <form method="post" action="{{ url_for('index') }}">
            <textarea name="prompt" placeholder="Ask a medical question based on uploaded literature..." required></textarea>
            <div class="btn-group">
                <button type="submit" class="send-btn">Send Query</button>
            </div>
        </form>

        <form method="get" action="{{ url_for('clear') }}">
            <div class="btn-group" style="justify-content: flex-end; margin-top: 0.5rem;">
                <button type="submit" class="clear-btn">Clear Conversation</button>
            </div>
        </form>
    </div>

    <script>
        // Automatically scroll the chat window to the bottom on new message loads
        const chatBox = document.getElementById('chat-box');
        if (chatBox) {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
